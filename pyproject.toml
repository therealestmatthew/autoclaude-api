[project]
name = "autoclaude"
version = "0.0.0"
description = "Command and control center for an agentic consulting & software-delivery practice."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Matthew Mule" }]

# Dependencies intentionally left empty in Phase 0.
# Agents get added per-subsystem as they're built — start with claude-agent-sdk
# when the scout agent lands in Phase 2.
dependencies = []

[project.optional-dependencies]
dev = [
  "ruff",
  "pytest",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = []
