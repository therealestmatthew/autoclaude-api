; Alembic config for the ft-autoclaude web persistent index.
;
; The script_location is relative to this file's directory. The DSN is
; resolved at runtime by `tools/index.py` via `web.apps.api.db.session.resolve_dsn`
; — we deliberately leave sqlalchemy.url empty here so the CLI is the single
; source of truth for picking SQLite vs Postgres.

[alembic]
script_location = .
prepend_sys_path = ../..
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
